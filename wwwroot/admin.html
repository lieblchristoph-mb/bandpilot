<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Account – The Dead Notes App</title>
  <script>(function(){var x=new XMLHttpRequest();x.open('GET','/version.txt?t='+Date.now(),true);x.onreadystatechange=function(){if(x.readyState===4&&x.status===200){var v=x.responseText.trim();if(v&&v!==localStorage.getItem('_bv')){localStorage.setItem('_bv',v);location.replace(location.pathname+'?_r='+v+'&_t='+Date.now());}}};x.send();if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(function(r){r.update();});navigator.serviceWorker.addEventListener("message",function(e){if(e.data&&e.data.type==="sw-updated")location.reload();});}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=__BUILD__" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <div class="grain"></div>

  <div class="login-screen" id="loginScreen" hidden>
    <div class="login-box">
      <img src="logo.jpeg" class="login-logo" alt="Logo" />
      <h2>The Dead Notes App</h2>
      <div id="loginSection">
        <p class="login-sub">Meld dich an, um fortzufahren.</p>
        <input id="loginName" type="text" placeholder="Name" autocomplete="username" />
        <input id="loginPassword" type="password" placeholder="Passwort" autocomplete="current-password" />
        <div id="loginError" class="login-error" hidden></div>
        <button id="loginBtn" class="primary">Anmelden</button>
      </div>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">
      <img src="logo.jpeg" class="brand-logo" alt="Logo" />
      <h1>The Dead Notes App</h1>
    </div>
    <div class="who">
      <span id="userDisplay" class="user-display" hidden></span>
    </div>
  </header>

  <nav class="subnav">
    <a href="/" class="subnav-link" data-label="Kalender">Kalender</a>
    <a href="/songs.html" class="subnav-link" data-label="Songs">Songs</a>
    <a href="/setlists.html" class="subnav-link" data-label="Sets">Setlisten</a>
    <a href="/todo.html" class="subnav-link" data-label="Todos">Todos</a>
    <a href="/finance.html" class="subnav-link" data-label="Finanzen">Finanzen</a>
    <a href="/admin.html" class="subnav-link active" data-label="Account" id="adminNavLink">Account</a>
  </nav>

  <main>
    <!-- Eigener Account (für alle User) -->
    <section class="members-card" style="margin-bottom:16px;">
      <h3>Mein Account</h3>
      <div id="myAccountInfo" style="display:flex;align-items:center;gap:14px;padding:12px 0;">
        <span id="myAccountDot" class="user-dot" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;"></span>
        <div>
          <div id="myAccountName" style="font-weight:700;font-size:16px;"></div>
          <div id="myAccountRole" style="font-size:13px;color:var(--muted);margin-top:2px;"></div>
        </div>
        <a href="/hilfe.html" class="ghost" style="font-size:13px;padding:6px 12px;text-decoration:none;margin-left:auto;margin-right:6px;">? Hilfe</a>
        <button id="logoutBtn" class="ghost danger">Abmelden</button>
      </div>
    </section>

    <!-- Userverwaltung + Aktivität (nur für Admins) -->
    <section class="members-card" id="adminSection" hidden>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h3 style="margin:0;">Benutzer &amp; letzter Login</h3>
        <button class="primary" style="font-size:13px;padding:8px 14px;" onclick="openAddMemberModal()">+ Mitglied</button>
      </div>
      <div id="adminUserList"></div>
      <h3 style="margin:20px 0 10px;">Aktivität</h3>
      <div id="activityTable" style="overflow-x:auto;"></div>
    </section>
  </main>

  <!-- Mitglied hinzufügen Modal -->
  <div class="modal" id="addMemberModal" hidden>
    <div class="modal-box">
      <h3>Neues Mitglied</h3>
      <input id="newMemberName" type="text" placeholder="Name" maxlength="40" autocomplete="off" />
      <input id="newMemberPassword" type="password" placeholder="Passwort" maxlength="100" autocomplete="new-password" />
      <div class="color-row" id="colorRow"></div>
      <div class="modal-actions">
        <button class="ghost" onclick="closeAddMemberModal()">Abbrechen</button>
        <button class="primary" id="saveMemberBtn" onclick="saveNewMember()">Hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Mitglied bearbeiten Modal -->
  <div class="modal" id="editMemberModal" hidden>
    <div class="modal-box">
      <h3>Mitglied bearbeiten</h3>
      <input id="editMemberName" type="text" placeholder="Bandname (sichtbar für alle)" autocomplete="off" />
      <input id="editMemberDisplayName" type="text" placeholder="Echter Name (nur für dich selbst)" autocomplete="off" />
      <div style="display:flex;align-items:center;gap:12px;">
        <label style="font-size:13px;color:var(--muted);white-space:nowrap;">Farbe:</label>
        <input id="editMemberColor" type="color" style="width:48px;height:36px;border:1px solid var(--line);border-radius:6px;background:none;cursor:pointer;padding:2px;" />
      </div>
      <input id="editMemberPassword" type="password" placeholder="Neues Passwort (leer = unverändert)" autocomplete="new-password" />
      <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;">
        <input id="editMemberIsAdmin" type="checkbox" style="width:18px;height:18px;" />
        Admin-Rechte
      </label>
      <div class="modal-actions">
        <button class="ghost" onclick="closeEditModal()">Abbrechen</button>
        <button class="primary" onclick="saveEditMember()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="nav-spinner-overlay" id="navSpinner"><div class="nav-spinner-ring"></div></div>
  <script>
    document.querySelectorAll('.subnav-link:not(.active)').forEach(a => {
      a.addEventListener('click', () => document.getElementById('navSpinner').classList.add('visible'));
    });
  </script>
  <script src="admin.js?v=__BUILD__"></script>
</body>
</html>
