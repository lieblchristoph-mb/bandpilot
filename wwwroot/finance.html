<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Finanzen – The Dead Notes App</title>
  <script>(function(){var x=new XMLHttpRequest();x.open('GET','/version.txt?t='+Date.now(),true);x.onreadystatechange=function(){if(x.readyState===4&&x.status===200){var v=x.responseText.trim();if(v&&v!==localStorage.getItem('_bv')){localStorage.setItem('_bv',v);location.replace(location.pathname+'?_r='+v+'&_t='+Date.now());}}};x.send();if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(function(r){r.update();});navigator.serviceWorker.addEventListener("message",function(e){if(e.data&&e.data.type==="sw-updated")location.reload();});}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=__BUILD__" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <div class="grain"></div>

  <div class="login-screen" id="loginScreen" hidden>
    <div class="login-box">
      <img src="logo.jpeg" class="login-logo" alt="Logo" />
      <h2>The Dead Notes App</h2>
      <div id="loginSection">
        <p class="login-sub">Meld dich an, um fortzufahren.</p>
        <input id="loginName" type="text" placeholder="Name" autocomplete="username" />
        <input id="loginPassword" type="password" placeholder="Passwort" autocomplete="current-password" />
        <div id="loginError" class="login-error" hidden></div>
        <button id="loginBtn" class="primary">Anmelden</button>
      </div>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">
      <img src="logo.jpeg" class="brand-logo" alt="Logo" />
      <h1>The Dead Notes App</h1>
    </div>
    <div class="who">
      <span id="userDisplay" class="user-display" hidden></span>
    </div>
  </header>

  <nav class="subnav">
    <a href="/" class="subnav-link" data-label="Kalender">Kalender</a>
    <a href="/songs.html" class="subnav-link" data-label="Songs">Songs</a>
    <a href="/setlists.html" class="subnav-link" data-label="Sets">Setlisten</a>
    <a href="/todo.html" class="subnav-link" data-label="Todos">Todos</a>
    <a href="/finance.html" class="subnav-link active" data-label="Finanzen">Finanzen</a>
    <a href="/admin.html" class="subnav-link" data-label="Account" id="adminNavLink">Account</a>
  </nav>

  <main id="mainView">
    <div class="page-header">
      <h2>Finanzen</h2>
      <button class="primary" id="newEventBtn" hidden onclick="openNewEventModal()">+ Event</button>
    </div>
    <div class="card-list" id="financeList">
      <p class="empty-state">Lade...</p>
    </div>
  </main>

  <!-- Event Detail Overlay -->
  <div id="detailOverlay" class="card-detail-overlay" hidden>
    <div class="card-detail-header">
      <button class="ghost" onclick="closeDetail()" style="padding:8px 14px;">← Zurück</button>
      <span id="detailTitle" style="font-weight:700;font-size:16px;flex:1;margin:0 12px;"></span>
      <button class="ghost danger" id="deleteEventBtn" hidden onclick="deleteCurrentEvent()" style="padding:8px 14px;">Löschen</button>
    </div>
    <div class="card-detail-content" id="detailContent"></div>
  </div>

  <!-- Neues Event Modal -->
  <div class="modal" id="newEventModal" hidden>
    <div class="modal-box">
      <h3>Neues Event</h3>
      <input id="newEventName" type="text" placeholder="Name (z.B. Konzert München)" />
      <input id="newEventDate" type="date" />
      <input id="newEventDesc" type="text" placeholder="Beschreibung (optional)" />
      <div class="modal-actions">
        <button class="ghost" onclick="closeNewEventModal()">Abbrechen</button>
        <button class="primary" onclick="createFinanceEvent()">Erstellen</button>
      </div>
    </div>
  </div>

  <!-- Ausgabe hinzufügen Modal -->
  <div class="modal" id="expenseModal" hidden>
    <div class="modal-box">
      <h3>Ausgabe eintragen</h3>
      <select id="expenseMember"></select>
      <input id="expenseAmount" type="number" step="0.01" min="0.01" placeholder="Betrag (€)" />
      <input id="expenseDesc" type="text" placeholder="Beschreibung (z.B. Benzin)" />
      <label class="upload-label" style="margin-top:4px;">
        📷 Foto aufnehmen (optional)
        <input type="file" id="expenseReceipt" accept="image/*" capture="environment" />
      </label>
      <span id="expenseReceiptName" style="font-size:13px;color:var(--muted);margin-top:-6px;"></span>
      <div class="modal-actions">
        <button class="ghost" onclick="closeExpenseModal()">Abbrechen</button>
        <button class="primary" id="expenseSaveBtn" onclick="submitExpense()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Beleg Lightbox -->
  <div id="receiptLightbox" class="receipt-lightbox" hidden>
    <button class="receipt-lightbox-close" onclick="closeReceiptLightbox()">✕</button>
    <img id="receiptImage" src="" alt="Beleg" />
  </div>

  <!-- Einnahme hinzufügen Modal -->
  <div class="modal" id="incomeModal" hidden>
    <div class="modal-box">
      <h3>Einnahme eintragen</h3>
      <input id="incomeAmount" type="number" step="0.01" min="0.01" placeholder="Betrag (€)" />
      <input id="incomeDesc" type="text" placeholder="Beschreibung (z.B. Konzertgage)" />
      <div class="modal-actions">
        <button class="ghost" onclick="closeIncomeModal()">Abbrechen</button>
        <button class="primary" onclick="submitIncome()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="nav-spinner-overlay" id="navSpinner"><div class="nav-spinner-ring"></div></div>
  <script>
    document.querySelectorAll('.subnav-link:not(.active)').forEach(a => {
      a.addEventListener('click', () => document.getElementById('navSpinner').classList.add('visible'));
    });
  </script>
  <script src="finance.js?v=__BUILD__"></script>
</body>
</html>
