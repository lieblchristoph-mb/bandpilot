<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Setlisten – The Dead Notes App</title>
  <script>(function(){var x=new XMLHttpRequest();x.open('GET','/version.txt?t='+Date.now(),true);x.onreadystatechange=function(){if(x.readyState===4&&x.status===200){var v=x.responseText.trim();if(v&&v!==localStorage.getItem('_bv')){localStorage.setItem('_bv',v);location.replace(location.pathname+'?_r='+v+'&_t='+Date.now());}}};x.send();if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(function(r){r.update();});navigator.serviceWorker.addEventListener("message",function(e){if(e.data&&e.data.type==="sw-updated")location.reload();});}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=__BUILD__" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <div class="grain"></div>

  <header class="topbar">
    <div class="brand">
      <img src="logo.jpeg" class="brand-logo" alt="Logo" />
      <h1>The Dead Notes App</h1>
    </div>
    <div class="who">
      <span id="userDisplay" class="user-display" hidden></span>
    </div>
  </header>

  <nav class="subnav">
    <a href="/" class="subnav-link" data-label="Kalender">Kalender</a>
    <a href="/songs.html" class="subnav-link" data-label="Songs">Songs</a>
    <a href="/setlists.html" class="subnav-link active" data-label="Sets">Setlisten</a>
    <a href="/todo.html" class="subnav-link" data-label="Todos">Todos</a>
    <a href="/finance.html" class="subnav-link" data-label="Finanzen">Finanzen</a>
    <a href="/admin.html" class="subnav-link" data-label="Account" id="adminNavLink">Account</a>
  </nav>

  <main>
    <div class="page-header">
      <h2>Setlisten</h2>
      <button id="addSetlistBtn" class="primary">+ Setliste</button>
    </div>
    <div id="setlistList" class="card-list"></div>
  </main>

  <!-- Setliste hinzufügen -->
  <div class="modal" id="setlistModal" hidden>
    <div class="modal-box">
      <h3>Neue Setliste</h3>
      <input id="setlistName" type="text" placeholder="Name (z.B. Krasser Busheislfetz‚)" maxlength="100" />
      <input id="setlistDate" type="date" placeholder="Datum (optional)" />
      <textarea id="setlistNotes" placeholder="Notizen (optional)" rows="2" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:15px;outline:none;resize:vertical;"></textarea>
      <div class="modal-actions">
        <button id="cancelSetlist" class="ghost">Abbrechen</button>
        <button id="saveSetlist" class="primary">Erstellen</button>
      </div>
    </div>
  </div>

  <!-- Setlist-Player -->
  <div id="playerOverlay" hidden>
    <div id="playerSheet">
      <div id="playerHeader">
        <button class="ghost" onclick="closePlayer()" style="font-size:20px;padding:4px 10px;">✕</button>
        <span id="playerSetlistName" style="font-weight:700;font-size:15px;flex:1;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"></span>
        <span style="width:44px;"></span>
      </div>
      <div id="playerNowPlaying">
        <div id="playerTrackTitle"></div>
        <div id="playerTrackMeta"></div>
      </div>
      <audio id="playerAudio" controls style="width:100%;margin:0 0 12px;"></audio>
      <div id="playerNavBtns">
        <button id="playerPrev" class="ghost" onclick="playerStep(-1)">⏮ Zurück</button>
        <button id="playerNext" class="ghost" onclick="playerStep(1)">Weiter ⏭</button>
      </div>
      <div id="playerQueueLabel">Playlist</div>
      <ul id="playerQueue"></ul>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <div class="nav-spinner-overlay" id="navSpinner"><div class="nav-spinner-ring"></div></div>
  <script>
    document.querySelectorAll(".subnav-link:not(.active)").forEach(a => {
      a.addEventListener("click", () => document.getElementById("navSpinner").classList.add("visible"));
    });
  </script>
  <script src="setlists.js?v=__BUILD__"></script>
</body>
</html>
